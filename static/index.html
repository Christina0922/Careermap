<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerMap - RIASEC 직업 추천</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 40px;
        }

        .step {
            display: none;
            animation: fadeIn 0.5s;
        }

        .step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="email"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .question-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .options {
            display: grid;
            gap: 10px;
        }

        .option {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .riasec-scores {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .riasec-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .riasec-card h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .riasec-card .score {
            font-size: 2.5em;
            font-weight: bold;
        }

        .recommendations {
            display: grid;
            gap: 20px;
            margin-top: 30px;
        }

        .job-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }

        .job-card:hover {
            transform: translateX(5px);
        }

        .job-title {
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .compatibility {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #667eea;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 CareerMap</h1>
            <p>RIASEC 기반 직업 추천 시스템</p>
        </div>

        <div class="content">
            <!-- Step 1: 이메일 입력 -->
            <div class="step active" id="step-email">
                <h2>시작하기</h2>
                <p style="margin-bottom: 20px; color: #666;">이메일을 입력하여 설문을 시작하세요.</p>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                <button class="btn" onclick="startSurvey()">설문 시작</button>
            </div>

            <!-- Step 2: 설문 -->
            <div class="step" id="step-survey">
                <h2>설문 조사</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress"></div>
                </div>
                <div id="survey-container"></div>
                <button class="btn btn-secondary" onclick="prevQuestion()" id="btn-prev" style="display: none;">이전</button>
                <button class="btn" onclick="nextQuestion()" id="btn-next">다음</button>
                <button class="btn" onclick="submitSurvey()" id="btn-submit" style="display: none;">제출</button>
            </div>

            <!-- Step 3: RIASEC 점수 -->
            <div class="step" id="step-scores">
                <h2>당신의 RIASEC 점수</h2>
                <div class="riasec-scores" id="riasec-scores"></div>
                <button class="btn" onclick="getRecommendations()">직업 추천 받기</button>
            </div>

            <!-- Step 4: 추천 결과 -->
            <div class="step" id="step-recommendations">
                <h2>추천 직업</h2>
                <div class="recommendations" id="recommendations"></div>
                <button class="btn btn-secondary" onclick="resetApp()">다시 시작</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentStep = 'email';
        let questions = [];
        let currentQuestionIndex = 0;
        let answers = {};
        let userEmail = '';
        let riasecScores = null;

        async function startSurvey() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('이메일을 입력해주세요.');
                return;
            }
            userEmail = email;

            try {
                const response = await fetch(`${API_BASE}/api/survey/questions`);
                questions = await response.json();
                showStep('survey');
                showQuestion(0);
            } catch (error) {
                showError('설문 문항을 불러오는데 실패했습니다.');
                console.error(error);
            }
        }

        function showStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');
            currentStep = step;
        }

        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;

            currentQuestionIndex = index;
            const question = questions[index];
            const container = document.getElementById('survey-container');
            
            // 현재 질문의 선택된 옵션들 가져오기
            const selectedOptions = answers[question.id] || [];

            container.innerHTML = `
                <div class="question-card">
                    <div class="question-title">${index + 1}. ${question.question_text}</div>
                    <div class="options">
                        ${question.options.map((opt) => `
                            <div class="option ${selectedOptions.includes(opt.id) ? 'selected' : ''}" 
                                 onclick="toggleOption(${question.id}, ${opt.id})">
                                ${opt.option_text}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            // 진행률 업데이트
            const progress = ((index + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;

            // 버튼 상태 업데이트
            document.getElementById('btn-prev').style.display = index === 0 ? 'none' : 'inline-block';
            document.getElementById('btn-next').style.display = index === questions.length - 1 ? 'none' : 'inline-block';
            document.getElementById('btn-submit').style.display = index === questions.length - 1 ? 'inline-block' : 'none';
        }

        function toggleOption(questionId, optionId) {
            // 복수 선택 지원: 배열로 관리
            if (!answers[questionId]) {
                answers[questionId] = [];
            }
            
            const index = answers[questionId].indexOf(optionId);
            if (index > -1) {
                // 이미 선택된 경우 제거
                answers[questionId].splice(index, 1);
            } else {
                // 선택되지 않은 경우 추가
                answers[questionId].push(optionId);
            }
            
            showQuestion(currentQuestionIndex);
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                showQuestion(currentQuestionIndex + 1);
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                showQuestion(currentQuestionIndex - 1);
            }
        }

        async function submitSurvey() {
            // 모든 질문에 답변했는지 확인 (최소 1개 이상 선택)
            const unanswered = questions.filter(q => !answers[q.id] || answers[q.id].length === 0);
            if (unanswered.length > 0) {
                alert('모든 질문에 최소 1개 이상 답변해주세요.');
                return;
            }

            const submitData = {
                email: userEmail,
                answers: questions.map(q => ({
                    question_id: q.id,
                    option_ids: answers[q.id] || []
                }))
            };

            try {
                document.getElementById('survey-container').innerHTML = '<div class="loading">제출 중...</div>';
                
                const response = await fetch(`${API_BASE}/api/survey/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(submitData)
                });

                if (!response.ok) {
                    throw new Error('제출 실패');
                }

                riasecScores = await response.json();
                showRIASECScores();
                showStep('scores');
            } catch (error) {
                showError('설문 제출에 실패했습니다.');
                console.error(error);
            }
        }

        function showRIASECScores() {
            const container = document.getElementById('riasec-scores');
            const types = [
                { key: 'R', name: 'Realistic', desc: '기술/현장' },
                { key: 'I', name: 'Investigative', desc: '연구/분석' },
                { key: 'A', name: 'Artistic', desc: '창의' },
                { key: 'S', name: 'Social', desc: '사회/교육' },
                { key: 'E', name: 'Enterprising', desc: '경영/리더십' },
                { key: 'C', name: 'Conventional', desc: '체계/행정' }
            ];

            container.innerHTML = types.map(type => `
                <div class="riasec-card">
                    <h3>${type.key}</h3>
                    <div class="score">${riasecScores[type.key]}</div>
                    <div>${type.name}</div>
                    <div style="font-size: 0.9em; opacity: 0.9;">${type.desc}</div>
                </div>
            `).join('');
        }

        async function getRecommendations() {
            try {
                document.getElementById('recommendations').innerHTML = '<div class="loading">추천 직업을 분석 중...</div>';
                showStep('recommendations');

                const response = await fetch(`${API_BASE}/api/jobs/recommendations?email=${encodeURIComponent(userEmail)}&top_n=10`);
                
                if (!response.ok) {
                    throw new Error('추천 실패');
                }

                const recommendations = await response.json();
                displayRecommendations(recommendations);
            } catch (error) {
                showError('직업 추천을 불러오는데 실패했습니다.');
                console.error(error);
            }
        }

        function displayRecommendations(recommendations) {
            const container = document.getElementById('recommendations');
            
            if (recommendations.length === 0) {
                container.innerHTML = '<div class="error">추천할 직업이 없습니다.</div>';
                return;
            }

            container.innerHTML = recommendations.map(rec => `
                <div class="job-card">
                    <div class="job-title">${rec.job.job_title}</div>
                    <div class="compatibility">적합도: ${rec.compatibility}%</div>
                    <div style="color: #666; margin-top: 10px;">카테고리: ${rec.job.category}</div>
                    ${rec.job.description ? `<div style="color: #666; margin-top: 5px;">${rec.job.description}</div>` : ''}
                </div>
            `).join('');
        }

        function resetApp() {
            currentStep = 'email';
            currentQuestionIndex = 0;
            answers = {};
            questions = [];
            riasecScores = null;
            userEmail = '';
            document.getElementById('email').value = '';
            showStep('email');
        }

        function showError(message) {
            const container = document.getElementById('survey-container') || document.getElementById('recommendations');
            if (container) {
                container.innerHTML = `<div class="error">${message}</div>`;
            }
        }
    </script>
</body>
</html>
